services:
  - type: web
    name: genesis
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: GENESIS_GATEWAY_PORT
        value: "8080"
      - key: GENESIS_STATE_DIR
        value: /data/.genesis
      - key: GENESIS_WORKSPACE_DIR
        value: /data/workspace
      - key: GENESIS_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: genesis-data
      mountPath: /data
      sizeGB: 1
