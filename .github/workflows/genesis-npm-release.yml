name: Genesis NPM Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v2026.4.24 or v2026.4.24-beta.1.
        required: true
        type: string
      npm_dist_tag:
        description: npm dist-tag. Automatic uses beta for prereleases and latest for stable releases.
        default: auto
        required: true
        type: choice
        options:
          - auto
          - beta
          - latest

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-release-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate npm release package
    if: github.repository == 'PIXELZX0/Genesis'
    runs-on: blacksmith-16vcpu-ubuntu-2404
    timeout-minutes: 90
    outputs:
      npm_dist_tag: ${{ steps.publish-target.outputs.npm_dist_tag }}
      package_version: ${{ steps.publish-target.outputs.package_version }}
      tag: ${{ steps.publish-target.outputs.tag }}
      tarball_artifact: ${{ steps.pack.outputs.artifact_name }}
      tarball_name: ${{ steps.pack.outputs.tarball_name }}

    env:
      CI: "1"
      COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
      GENESIS_NPM_PACKAGE_NAME: "@pixelzx/genesis"

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare "$(node -p "require('./package.json').packageManager")" --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve publish target
        id: publish-target
        env:
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_NPM_DIST_TAG: ${{ inputs.npm_dist_tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          tag="${RELEASE_TAG:-$INPUT_TAG}"
          if [ -z "$tag" ]; then
            echo "Missing release tag." >&2
            exit 1
          fi

          case "$tag" in
            v*) ;;
            *)
              echo "Release tag must start with v: $tag" >&2
              exit 1
              ;;
          esac

          package_version="${tag#v}"
          package_json_version="$(node -p "require('./package.json').version")"
          if [ "$package_json_version" != "$package_version" ]; then
            echo "package.json version $package_json_version does not match release tag $tag." >&2
            exit 1
          fi

          requested_dist_tag="${INPUT_NPM_DIST_TAG:-auto}"
          if [ "$requested_dist_tag" = "auto" ]; then
            if [ "$RELEASE_PRERELEASE" = "true" ] || printf '%s\n' "$tag" | grep -Eq -- '-beta\.[0-9]+$'; then
              npm_dist_tag="beta"
            else
              npm_dist_tag="latest"
            fi
          else
            npm_dist_tag="$requested_dist_tag"
          fi

          if [ "$npm_dist_tag" = "latest" ] && printf '%s\n' "$tag" | grep -Eq -- '-beta\.[0-9]+$'; then
            echo "Beta prerelease tags may only publish to the beta npm dist-tag." >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "package_version=$package_version" >> "$GITHUB_OUTPUT"
          echo "npm_dist_tag=$npm_dist_tag" >> "$GITHUB_OUTPUT"

      - name: Build release artifacts
        run: |
          pnpm build
          pnpm ui:build

      - name: Run release checks
        env:
          RELEASE_TAG: ${{ steps.publish-target.outputs.tag }}
        run: |
          pnpm check:architecture
          pnpm check:test-types
          pnpm release:check
          pnpm release:genesis:npm:check

      - name: Pack release tarball
        id: pack
        env:
          PACKAGE_VERSION: ${{ steps.publish-target.outputs.package_version }}
        run: |
          pack_dir=".artifacts/npm-release-pack"
          rm -rf "$pack_dir"
          mkdir -p "$pack_dir"
          npm pack --pack-destination "$pack_dir"
          tarball="$(find "$pack_dir" -maxdepth 1 -type f -name '*.tgz' -print -quit)"
          test -n "$tarball"
          test -f "$tarball"
          tarball_name="$(basename "$tarball")"
          artifact_name="genesis-npm-release-tarball-${PACKAGE_VERSION}"
          echo "artifact_name=$artifact_name" >> "$GITHUB_OUTPUT"
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"
          echo "tarball_name=$tarball_name" >> "$GITHUB_OUTPUT"

      - name: Upload release tarball
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: ${{ steps.pack.outputs.artifact_name }}
          path: ${{ steps.pack.outputs.tarball }}
          retention-days: 7

  publish:
    name: Publish @pixelzx/genesis to npm
    needs: validate
    if: github.repository == 'PIXELZX0/Genesis'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: npm-release

    env:
      CI: "1"
      COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
      GENESIS_NPM_PACKAGE_NAME: "@pixelzx/genesis"

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.validate.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@11.5.1

      - name: Download release tarball
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.validate.outputs.tarball_artifact }}
          path: .artifacts/npm-release-tarball

      - name: Check existing npm version
        id: npm-version
        env:
          PACKAGE_VERSION: ${{ needs.validate.outputs.package_version }}
        run: |
          if npm view "$GENESIS_NPM_PACKAGE_NAME@$PACKAGE_VERSION" version --silent >/tmp/genesis-npm-version.txt 2>/dev/null; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "$GENESIS_NPM_PACKAGE_NAME@$PACKAGE_VERSION is already published; publish step will be skipped."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.npm-version.outputs.already_published != 'true'
        env:
          NPM_DIST_TAG: ${{ needs.validate.outputs.npm_dist_tag }}
          PUBLISH_TARBALL: .artifacts/npm-release-tarball/${{ needs.validate.outputs.tarball_name }}
        run: |
          test -f "$PUBLISH_TARBALL"
          npm publish "$PUBLISH_TARBALL" --access public --tag "$NPM_DIST_TAG" --provenance

  verify_published:
    name: Verify published npm package
    needs: [validate, publish]
    if: github.repository == 'PIXELZX0/Genesis'
    runs-on: blacksmith-16vcpu-ubuntu-2404
    timeout-minutes: 30

    env:
      CI: "1"
      COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
      GENESIS_NPM_PACKAGE_NAME: "@pixelzx/genesis"
      GENESIS_NPM_POSTPUBLISH_RETRY_ATTEMPTS: "30"
      NPM_DIST_TAG: ${{ needs.validate.outputs.npm_dist_tag }}

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.validate.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare "$(node -p "require('./package.json').packageManager")" --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify published package
        env:
          PACKAGE_VERSION: ${{ needs.validate.outputs.package_version }}
        run: node --import tsx scripts/genesis-npm-postpublish-verify.ts "$PACKAGE_VERSION"
