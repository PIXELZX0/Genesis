name: Install Smoke

on:
  workflow_call:
    inputs:
      run_bun_global_install_smoke:
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      run_bun_global_install_smoke:
        type: boolean
        default: false
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: read

concurrency:
  group: ${{ github.event_name == 'workflow_dispatch' && format('{0}-manual-{1}', github.workflow, github.run_id) || format('{0}-{1}', github.workflow, github.ref) }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-24.04
    outputs:
      run_bun_global_install_smoke: ${{ steps.scope.outputs.run_bun_global_install_smoke }}
      run_fast_install_smoke: ${{ steps.scope.outputs.run_fast_install_smoke }}
      run_full_install_smoke: ${{ steps.scope.outputs.run_full_install_smoke }}
      run_install_smoke: ${{ steps.scope.outputs.run_install_smoke }}
    steps:
      - name: Resolve install smoke scope
        id: scope
        env:
          GENESIS_CI_WORKFLOW_BUN_GLOBAL_INSTALL_SMOKE: ${{ inputs.run_bun_global_install_smoke || false }}
        run: |
          event_name="${{ github.event_name }}"
          run_bun_global_install_smoke="${GENESIS_CI_WORKFLOW_BUN_GLOBAL_INSTALL_SMOKE:-false}"
          run_fast_install_smoke=true
          run_full_install_smoke=false
          run_install_smoke=true

          if [ "$event_name" = "schedule" ]; then
            run_bun_global_install_smoke=true
            run_full_install_smoke=true
          fi

          echo "run_bun_global_install_smoke=$run_bun_global_install_smoke" >> "$GITHUB_OUTPUT"
          echo "run_fast_install_smoke=$run_fast_install_smoke" >> "$GITHUB_OUTPUT"
          echo "run_full_install_smoke=$run_full_install_smoke" >> "$GITHUB_OUTPUT"
          echo "run_install_smoke=$run_install_smoke" >> "$GITHUB_OUTPUT"

  install-smoke-fast:
    name: Install smoke fast
    needs: preflight
    if: needs.preflight.outputs.run_fast_install_smoke == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run fast install smoke
        env:
          GENESIS_INSTALL_SMOKE_UPDATE_BASELINE: latest
          GENESIS_INSTALL_SMOKE_SKIP_NPM_GLOBAL: "1"
        run: bash scripts/test-install-sh-docker.sh

  install-smoke-full:
    name: Install smoke full
    needs: preflight
    if: needs.preflight.outputs.run_full_install_smoke == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run full install smoke
        env:
          GENESIS_INSTALL_SMOKE_UPDATE_BASELINE: latest
        run: bash scripts/test-install-sh-docker.sh

  install-bun:
    name: Bun global install smoke
    needs: preflight
    if: needs.preflight.outputs.run_bun_global_install_smoke == 'true'
    runs-on: ubuntu-24.04
    env:
      install-bun: ${{ needs.preflight.outputs.run_bun_global_install_smoke }}
      GENESIS_BUN_GLOBAL_SMOKE_DIST_IMAGE: genesis-dockerfile-smoke:local
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run Bun global install image-provider smoke
        run: bash scripts/e2e/bun-global-install-smoke.sh
