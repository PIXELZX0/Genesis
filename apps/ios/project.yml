name: Genesis
options:
  bundleIdPrefix: ai.genesis
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_APP_INTENTS_METADATA_GENERATION: NO

packages:
  GenesisKit:
    path: ../shared/GenesisKit
  Swabble:
    path: ../../Swabble

schemes:
  Genesis:
    shared: true
    build:
      targets:
        Genesis: all
    test:
      targets:
        - GenesisTests
        - GenesisLogicTests
  GenesisLogicTests:
    shared: true
    build:
      targets:
        GenesisLogicTests: all
    test:
      targets:
        - GenesisLogicTests

targets:
  Genesis:
    type: application
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Sources
    dependencies:
      - target: GenesisShareExtension
        embed: true
      - target: GenesisActivityWidget
        embed: true
      - target: GenesisWatchApp
      - package: GenesisKit
      - package: GenesisKit
        product: GenesisChatUI
      - package: GenesisKit
        product: GenesisProtocol
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    preBuildScripts:
      - name: SwiftFormat (lint)
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftformat >/dev/null 2>&1; then
            echo "error: swiftformat not found (brew install swiftformat)" >&2
            exit 1
          fi
          swiftformat --lint --config "$SRCROOT/../../.swiftformat" \
            --filelist "$SRCROOT/SwiftSources.input.xcfilelist"
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftlint >/dev/null 2>&1; then
            echo "error: swiftlint not found (brew install swiftlint)" >&2
            exit 1
          fi
          swiftlint lint --config "$SRCROOT/.swiftlint.yml" --use-script-input-file-lists
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_ENTITLEMENTS: Sources/Genesis.entitlements
        CODE_SIGN_STYLE: "$(GENESIS_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(GENESIS_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(GENESIS_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(GENESIS_APP_PROFILE)"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
      configs:
        Debug:
          GENESIS_PUSH_TRANSPORT: direct
          GENESIS_PUSH_DISTRIBUTION: local
          GENESIS_PUSH_RELAY_BASE_URL: ""
          GENESIS_PUSH_APNS_ENVIRONMENT: sandbox
        Release:
          GENESIS_PUSH_TRANSPORT: direct
          GENESIS_PUSH_DISTRIBUTION: local
          GENESIS_PUSH_RELAY_BASE_URL: ""
          GENESIS_PUSH_APNS_ENVIRONMENT: production
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Genesis
        CFBundleIconName: AppIcon
        CFBundleURLTypes:
          - CFBundleURLName: ai.genesis.ios
            CFBundleURLSchemes:
              - genesis
        CFBundleShortVersionString: "$(GENESIS_MARKETING_VERSION)"
        GenesisCanonicalVersion: "$(GENESIS_IOS_VERSION)"
        CFBundleVersion: "$(GENESIS_BUILD_VERSION)"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
          - remote-notification
        BGTaskSchedulerPermittedIdentifiers:
          - ai.genesis.ios.bgrefresh
        NSLocalNetworkUsageDescription: Genesis discovers and connects to your Genesis gateway on the local network.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsInWebContent: true
        NSBonjourServices:
          - _genesis-gw._tcp
        NSCameraUsageDescription: Genesis can capture photos or short video clips when requested via the gateway.
        NSLocationWhenInUseUsageDescription: Genesis uses your location when you allow location sharing.
        NSLocationAlwaysAndWhenInUseUsageDescription: Genesis can share your location in the background when you enable Always.
        NSMicrophoneUsageDescription: Genesis needs microphone access for voice wake.
        NSMotionUsageDescription: Genesis may use motion data to support device-aware interactions and automations.
        NSPhotoLibraryUsageDescription: Genesis needs photo library access when you choose existing photos to share with your assistant.
        NSSpeechRecognitionUsageDescription: Genesis uses on-device speech recognition for voice wake.
        NSSupportsLiveActivities: true
        ITSAppUsesNonExemptEncryption: false
        GenesisPushTransport: "$(GENESIS_PUSH_TRANSPORT)"
        GenesisPushDistribution: "$(GENESIS_PUSH_DISTRIBUTION)"
        GenesisPushRelayBaseURL: "$(GENESIS_PUSH_RELAY_BASE_URL)"
        GenesisPushAPNsEnvironment: "$(GENESIS_PUSH_APNS_ENVIRONMENT)"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  GenesisShareExtension:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ShareExtension
    dependencies:
      - package: GenesisKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(GENESIS_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(GENESIS_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(GENESIS_SHARE_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(GENESIS_SHARE_PROFILE)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Genesis Share
        CFBundleShortVersionString: "$(GENESIS_MARKETING_VERSION)"
        CFBundleVersion: "$(GENESIS_BUILD_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsImageWithMaxCount: 10
              NSExtensionActivationSupportsMovieWithMaxCount: 1

  GenesisActivityWidget:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ActivityWidget
      - path: Sources/LiveActivity/GenesisActivityAttributes.swift
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: ActivityKit.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(GENESIS_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(GENESIS_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(GENESIS_ACTIVITY_WIDGET_BUNDLE_ID)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
    info:
      path: ActivityWidget/Info.plist
      properties:
        CFBundleDisplayName: Genesis Activity
        CFBundleShortVersionString: "$(GENESIS_MARKETING_VERSION)"
        CFBundleVersion: "$(GENESIS_BUILD_VERSION)"
        NSSupportsLiveActivities: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  GenesisWatchApp:
    type: application.watchapp2
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchApp
    dependencies:
      - target: GenesisWatchExtension
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    attributes:
      DevelopmentTeam: "$(GENESIS_DEVELOPMENT_TEAM)"
      ProvisioningStyle: "$(GENESIS_CODE_SIGN_STYLE)"
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(GENESIS_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(GENESIS_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(GENESIS_WATCH_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(GENESIS_WATCH_APP_PROFILE)"
    info:
      path: WatchApp/Info.plist
      properties:
        CFBundleDisplayName: Genesis
        CFBundleShortVersionString: "$(GENESIS_MARKETING_VERSION)"
        CFBundleVersion: "$(GENESIS_BUILD_VERSION)"
        WKCompanionAppBundleIdentifier: "$(GENESIS_APP_BUNDLE_ID)"
        WKWatchKitApp: true

  GenesisWatchExtension:
    type: watchkit2-extension
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchExtension/Sources
    dependencies:
      - sdk: AppIntents.framework
      - sdk: WatchConnectivity.framework
      - sdk: UserNotifications.framework
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    attributes:
      DevelopmentTeam: "$(GENESIS_DEVELOPMENT_TEAM)"
      ProvisioningStyle: "$(GENESIS_CODE_SIGN_STYLE)"
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(GENESIS_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(GENESIS_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(GENESIS_WATCH_EXTENSION_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(GENESIS_WATCH_EXTENSION_PROFILE)"
    info:
      path: WatchExtension/Info.plist
      properties:
        CFBundleDisplayName: Genesis
        CFBundleShortVersionString: "$(GENESIS_MARKETING_VERSION)"
        CFBundleVersion: "$(GENESIS_BUILD_VERSION)"
        NSExtension:
          NSExtensionAttributes:
            WKAppBundleIdentifier: "$(GENESIS_WATCH_APP_BUNDLE_ID)"
          NSExtensionPointIdentifier: com.apple.watchkit

  GenesisTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests
        excludes:
          - Logic
    dependencies:
      - target: Genesis
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(GENESIS_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(GENESIS_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.genesis.ios.tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Genesis.app/Genesis"
        BUNDLE_LOADER: "$(TEST_HOST)"
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: GenesisTests
        CFBundleShortVersionString: "$(GENESIS_MARKETING_VERSION)"
        CFBundleVersion: "$(GENESIS_BUILD_VERSION)"

  GenesisLogicTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests/Logic
    dependencies:
      - package: GenesisKit
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(GENESIS_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(GENESIS_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.genesis.ios.logic-tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: GenesisLogicTests
        CFBundleShortVersionString: "$(GENESIS_MARKETING_VERSION)"
        CFBundleVersion: "$(GENESIS_BUILD_VERSION)"
